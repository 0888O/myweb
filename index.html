<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>08880 website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background-color: #f9fafb;
            color: #1f2937;
            line-height: 1.5;
            padding: 2rem 1rem;
            transition: background-color 0.2s, color 0.2s;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 2rem 2rem 2.5rem;
            transition: background-color 0.2s, color 0.2s;
        }

        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding-bottom: 1.5rem;
            margin-bottom: 1.8rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .name-area {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b6e4f, #1e4a3b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .btns-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #f3f4f6;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s ease;
            font-family: inherit;
            color: #1f2937;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: #e5e7eb;
            transform: translateY(-1px);
        }

        .welcome-card {
            background: #f0fdf4;
            border-left: 6px solid #2b6e4f;
            padding: 1.2rem 1.5rem;
            border-radius: 20px;
            margin: 1.5rem 0 2rem 0;
        }

        .greeting {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .intro-text {
            color: #2d3e2b;
            margin-top: 0.3rem;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin: 2rem 0 1rem 0;
            padding-bottom: 0.4rem;
            border-bottom: 3px solid #d1d5db;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin: 1rem 0 0.5rem 0;
        }

        .info-card {
            background: #ffffff;
            border: 1px solid #eef2f6;
            border-radius: 24px;
            padding: 1.2rem 1.4rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }

        .info-card h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .badge {
            background: #eef2ff;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e3a8a;
        }

        .game-list, .hobby-list {
            list-style: none;
            padding-left: 0;
        }

        .game-list li, .hobby-list li {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .fa-solid, .fa-brands {
            color: #2b6e4f;
        }

        hr {
            margin: 1.8rem 0 1rem;
            border: 0;
            height: 1px;
            background: linear-gradient(to right, #e5e7eb, transparent);
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #6c757d;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e9ecef;
        }

        .message-board-section {
            margin-top: 3rem;
            border-top: 2px solid #e5e7eb;
            padding-top: 2rem;
        }

        .message-board-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #2b6e4f, #1e4a3b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1rem;
            background: #f9fafb;
            color: #1f2937;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2b6e4f;
            box-shadow: 0 0 0 3px rgba(43,110,79,0.1);
        }

        .submit-btn {
            background: #2b6e4f;
            color: white;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: #1e4a3b;
            transform: translateY(-1px);
        }

        .message-board {
            margin-top: 2rem;
        }

        .message-item {
            background: #f9fafb;
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            transition: all 0.2s;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .message-user {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2b6e4f, #1e4a3b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .username {
            font-weight: 600;
            font-size: 1rem;
        }

        .message-time {
            font-size: 0.75rem;
            color: #6c757d;
        }

        .message-content {
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .empty-message {
            text-align: center;
            padding: 2rem;
            color: #6c757d;
        }

        @media (max-width: 560px) {
            .container { padding: 1.5rem; }
            .name-area { font-size: 1.5rem; }
            .section-title { font-size: 1.4rem; }
        }

        body.dark { background-color: #121826; }
        .container.dark-theme { background-color: #1e293b; color: #e2e8f0; }
        .container.dark-theme .fa-solid, 
        .container.dark-theme .fa-brands { color: #6fcf97; }
        .container.dark-theme .info-card { background-color: #2d3a4b; border-color: #3f4e62; color: #f1f5f9; }
        .container.dark-theme .welcome-card { background-color: #1e2a2f; border-left-color: #4ade80; }
        .container.dark-theme .nav-btn { background-color: #334155; color: #f0f9ff; }
        .container.dark-theme .message-item { background: #2d3a4b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="name-area">08880 空八控控</div>
            <div class="btns-group">
                <button class="nav-btn menu-btn">
                    <i class="fa-solid fa-folder-open"></i> <span class="btn-text">目錄</span>
                </button>
                <button class="nav-btn lang-switch-btn">
                    <i class="fa-solid fa-globe"></i> <span class="btn-text">中/En</span>
                </button>
                <button class="nav-btn theme-btn">
                    <i class="fa-solid fa-moon"></i> <span class="btn-text">黑/白</span>
                </button>
            </div>
        </div>

        <div class="welcome-card">
            <div class="greeting">
                <i class="fa-solid fa-suitcase-rolling"></i>
                <span class="greeting-content">旅途者你好，歡迎到此坐訪</span>
            </div>
            <div class="intro-text">我是 08880，可以叫我 空巴 或 08。目前正在學習如何架設我的網頁，希望在未來我可以運用目前所學會的技巧並創造出價值。</div>
        </div>

        <div class="grid-2col">
            <div class="info-card">
                <h3 class="games-title"><i class="fa-solid fa-gamepad"></i> 我平時會玩的遊戲</h3>
                <ul class="game-list">
                </ul>
            </div>
            <div class="info-card">
                <h3 class="hobby-title"><i class="fa-solid fa-heart"></i> 我的嗜好</h3>
                <ul class="hobby-list">
                </ul>
            </div>
        </div>

        <div class="info-card" style="margin-top: 0.8rem;">
            <h3 class="skills-title"><i class="fa-solid fa-gear"></i> 目前接觸到的</h3>
            <div class="badge-list skills-list">
            </div>
        </div>

        <div>
            <h2 class="section-title goals-title">
                <i class="fa-solid fa-bullseye"></i> 我的目標
            </h2>
            <div class="grid-2col" style="margin-top: 1rem;">
                <div class="info-card">
                    <h3 class="short-goal-title"><i class="fa-solid fa-thumbtack"></i> 短期目標</h3>
                    <p class="short-goal-text">學習 HTML 並熟悉運用，打好網頁基礎。</p>
                </div>
                <div class="info-card">
                    <h3 class="long-goal-title"><i class="fa-solid fa-rocket"></i> 長期目標</h3>
                    <p class="long-goal-text">學習更多種程式語言，成為跨領域開發者。</p>
                </div>
                <div class="info-card">
                    <h3 class="life-goal-title"><i class="fa-solid fa-briefcase"></i> 生涯目標</h3>
                    <p class="life-goal-text">將程式技能運用在職場中，創造實際價值。</p>
                </div>
            </div>
        </div>

        <div class="message-board-section">
            <h2 class="message-board-title"><i class="fa-solid fa-comments"></i> 留言板</h2>
            <div class="form">
                <div class="form-group">
                    <input type="text" class="username-input" placeholder="暱稱 / Nickname">
                </div>
                <div class="form-group">
                    <textarea class="message-input" placeholder="留言內容 / Message"></textarea>
                </div>
                <button class="submit-btn">
                    <i class="fa-solid fa-pen-to-square"></i> <span class="submit-text">留言 / Post</span>
                </button>
            </div>
            <div class="message-board">
                <div class="empty-message empty-msg">✨ 暫無留言，來搶頭香吧！</div>
            </div>
        </div>

        <hr />
        <footer>
            <p class="footer-text">© 2025 08880 · 持續建構中的自介網站 · 歡迎交流</p>
        </footer>
    </div>

    <script>
        const content = {
            zh: {
                topBarName: "08880 空八控控",
                greeting: "旅途者你好，歡迎到此坐訪",
                greetingIcon: "fa-suitcase-rolling",
                intro: "我是 08880，可以叫我 空巴 或 08。目前正在學習如何架設我的網頁，希望在未來我可以運用目前所學會的技巧並創造出價值。",
                gamesTitle: "我平時會玩的遊戲",
                gamesIcon: "fa-gamepad",
                games: ["麥塊", "雀魂", "鳴潮", "特戰英豪"],
                hobbyTitle: "我的嗜好",
                hobbyIcon: "fa-heart",
                hobbies: ["學習各種程式語言", "打遊戲", "追劇", "看動漫"],
                skillsTitle: "目前接觸到的",
                skillsIcon: "fa-gear",
                skills: ["Python", "C++", "HTML", "CSS"],
                goalsTitle: "我的目標",
                goalsIcon: "fa-bullseye",
                shortGoalTitle: "短期目標",
                shortGoalIcon: "fa-thumbtack",
                shortGoalText: "學習 HTML 並熟悉運用，打好網頁基礎。",
                longGoalTitle: "長期目標",
                longGoalIcon: "fa-rocket",
                longGoalText: "學習更多種程式語言，並持續精進，成為跨領域開發者。",
                lifeGoalTitle: "生涯目標",
                lifeGoalIcon: "fa-briefcase",
                lifeGoalText: "將撰寫程式的技能運用在職場中，創造實際價值與解決問題。",
                footer: "© 2025 08880 · 持續建構中的自介網站 · 歡迎交流",
                menuBtn: "目錄",
                langBtn: "中/En",
                themeBtn: "黑/白",
                messageBoardTitle: "留言板",
                messageBoardIcon: "fa-comments",
                submitBtn: "留言 / Post",
                submitIcon: "fa-pen-to-square",
                emptyMessage: "暫無留言，來搶頭香吧！",
                postedPrefix: "發布於"
            },
            en: {
                topBarName: "08880 KongBa",
                greeting: "Hello traveler, welcome to my site",
                greetingIcon: "fa-suitcase-rolling",
                intro: "I'm 08880, you can call me Kongba. I'm learning to build my website and hope to create value with my skills in the future.",
                gamesTitle: "Games I Play",
                gamesIcon: "fa-gamepad",
                games: ["Minecraft", "Mahjong Soul", "Wuthering Waves", "Valorant"],
                hobbyTitle: "My Hobbies",
                hobbyIcon: "fa-heart",
                hobbies: ["Coding", "Gaming", "Watching Shows", "Anime"],
                skillsTitle: "Tech Stack",
                skillsIcon: "fa-gear",
                skills: ["Python", "C++", "HTML", "CSS"],
                goalsTitle: "My Goals",
                goalsIcon: "fa-bullseye",
                shortGoalTitle: "Short-term",
                shortGoalIcon: "fa-thumbtack",
                shortGoalText: "Master HTML and web basics.",
                longGoalTitle: "Long-term",
                longGoalIcon: "fa-rocket",
                longGoalText: "Learn more languages and become a full-stack developer.",
                lifeGoalTitle: "Career",
                lifeGoalIcon: "fa-briefcase",
                lifeGoalText: "Apply coding skills in a professional career.",
                footer: "© 2025 08880 · Site under construction · Welcome to connect",
                menuBtn: "Menu",
                langBtn: "Zh/En",
                themeBtn: "Dark/Light",
                messageBoardTitle: "Message Board",
                messageBoardIcon: "fa-comments",
                submitBtn: "Post",
                submitIcon: "fa-pen-to-square",
                emptyMessage: "No messages yet. Be the first!",
                postedPrefix: "Posted on"
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        let currentLang = urlParams.get('lang') === 'en' ? 'en' : 'zh';

        // 更新 
        function updateContent() {
            const t = content[currentLang];
            document.querySelector('.name-area').textContent = t.topBarName;
            
            document.querySelector('.greeting-content').textContent = t.greeting;
            document.querySelector('.greeting i').className = `fa-solid ${t.greetingIcon}`;
            document.querySelector('.intro-text').textContent = t.intro;

            const updateSection = (titleClass, icon, text) => {
                const el = document.querySelector(titleClass);
                el.innerHTML = `<i class="fa-solid ${icon}"></i> ${text}`;
            };

            updateSection('.games-title', t.gamesIcon, t.gamesTitle);
            updateSection('.hobby-title', t.hobbyIcon, t.hobbyTitle);
            updateSection('.skills-title', t.skillsIcon, t.skillsTitle);
            updateSection('.goals-title', t.goalsIcon, t.goalsTitle);
            updateSection('.short-goal-title', t.shortGoalIcon, t.shortGoalTitle);
            updateSection('.long-goal-title', t.longGoalIcon, t.longGoalTitle);
            updateSection('.life-goal-title', t.lifeGoalIcon, t.lifeGoalTitle);
            updateSection('.message-board-title', t.messageBoardIcon, t.messageBoardTitle);

            document.querySelector('.game-list').innerHTML = t.games.map(game => `<li><i class="fa-solid fa-gamepad"></i> ${game}</li>`).join('');
            document.querySelector('.hobby-list').innerHTML = t.hobbies.map(hobby => `<li><i class="fa-solid fa-star"></i> ${hobby}</li>`).join('');
            document.querySelector('.skills-list').innerHTML = t.skills.map(skill => `<span class="badge">${skill}</span>`).join('');

            document.querySelector('.short-goal-text').textContent = t.shortGoalText;
            document.querySelector('.long-goal-text').textContent = t.longGoalText;
            document.querySelector('.life-goal-text').textContent = t.lifeGoalText;
            document.querySelector('.footer-text').textContent = t.footer;

            document.querySelector('.menu-btn .btn-text').textContent = t.menuBtn;
            document.querySelector('.lang-switch-btn .btn-text').textContent = t.langBtn;
            document.querySelector('.theme-btn .btn-text').textContent = t.themeBtn;
            document.querySelector('.submit-btn .submit-text').textContent = t.submitBtn;

            document.title = currentLang === 'zh' ? '08880 Website' : "08 Website";
        }

        // 留言板
        function getCurrentTime() {
            const now = new Date();
            return `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }

        function escapeHtml(str) {
            return str ? str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : '';
        }

        function addMessage(username, message, time) {
            const t = content[currentLang];
            const board = document.querySelector('.message-board');
            const empty = document.querySelector('.empty-msg');
            if (empty) empty.remove();

            const div = document.createElement('div');
            div.className = 'message-item';
            div.innerHTML = `
                <div class="message-header">
                    <div class="message-user">
                        <div class="avatar">${username.charAt(0).toUpperCase()}</div>
                        <span class="username">${escapeHtml(username)}</span>
                    </div>
                    <span class="message-time" data-original-time="${time}">${t.postedPrefix} ${time}</span>
                </div>
                <div class="message-content">${escapeHtml(message)}</div>
            `;
            board.prepend(div);
        }

        // 按鈕點擊
        document.querySelector('.menu-btn').addEventListener('click', () => {
            document.querySelector('.welcome-card').scrollIntoView({ behavior: 'smooth' });
        });

        document.querySelector('.lang-switch-btn').addEventListener('click', () => {
            const newLang = currentLang === 'zh' ? 'en' : 'zh';
            const url = new URL(window.location.href);
            url.searchParams.set('lang', newLang);
            window.location.href = url.toString();
        });

        const themeBtn = document.querySelector('.theme-btn');
        const container = document.querySelector('.container');
        themeBtn.addEventListener('click', () => {
            const isDark = container.classList.toggle('dark-theme');
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeBtn.querySelector('i').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        });

        // 初始顏色設定
        if (localStorage.getItem('theme') === 'dark') {
            container.classList.add('dark-theme');
            document.body.classList.add('dark');
            themeBtn.querySelector('i').className = 'fa-solid fa-sun';
        }

        document.querySelector('.submit-btn').addEventListener('click', () => {
            const uInput = document.querySelector('.username-input');
            const mInput = document.querySelector('.message-input');
            if (!mInput.value.trim()) return alert('請輸入留言');
            const user = uInput.value.trim() || (currentLang === 'zh' ? '匿名' : 'Anonymous');
            const time = getCurrentTime();
            addMessage(user, mInput.value, time);
            uInput.value = ''; mInput.value = '';
        });

        updateContent();
    </script>
</body>
</html>
